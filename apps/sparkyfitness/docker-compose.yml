services:
  sparkyfitness-db:
    image: postgres:18.3-alpine
    container_name: sparkyfitness-db
    restart: always
    environment:
      POSTGRES_DB: ${SPARKY_FITNESS_DB_NAME:-sparkyfitness_db}
      POSTGRES_USER: ${SPARKY_FITNESS_DB_USER:-sparky}
      POSTGRES_PASSWORD: ${SPARKY_FITNESS_DB_PASSWORD}
    volumes:
      - ${APP_DATA_DIR}/postgresql:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPARKY_FITNESS_DB_USER:-sparky} -d ${SPARKY_FITNESS_DB_NAME:-sparkyfitness_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sparkyfitness-network

  sparkyfitness-server:
    image: codewithcj/sparkyfitness_server:latest
    container_name: sparkyfitness-server
    restart: always
    environment:
      SPARKY_FITNESS_LOG_LEVEL: ${SPARKY_FITNESS_LOG_LEVEL:-info}
      ALLOW_PRIVATE_NETWORK_CORS: "true"
      SPARKY_FITNESS_DB_USER: ${SPARKY_FITNESS_DB_USER:-sparky}
      SPARKY_FITNESS_DB_HOST: sparkyfitness-db
      SPARKY_FITNESS_DB_NAME: ${SPARKY_FITNESS_DB_NAME:-sparkyfitness_db}
      SPARKY_FITNESS_DB_PASSWORD: ${SPARKY_FITNESS_DB_PASSWORD}
      SPARKY_FITNESS_APP_DB_USER: ${SPARKY_FITNESS_APP_DB_USER:-sparkyapp}
      SPARKY_FITNESS_APP_DB_PASSWORD: ${SPARKY_FITNESS_APP_DB_PASSWORD}
      SPARKY_FITNESS_DB_PORT: 5432
      SPARKY_FITNESS_API_ENCRYPTION_KEY: ${SPARKY_FITNESS_API_ENCRYPTION_KEY}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      SPARKY_FITNESS_FRONTEND_URL: ${SPARKY_FITNESS_FRONTEND_URL:-http://localhost:3004}
      SPARKY_FITNESS_DISABLE_SIGNUP: "false"
      SPARKY_FITNESS_ADMIN_EMAIL: ${SPARKY_FITNESS_ADMIN_EMAIL}
      SPARKY_FITNESS_MCP_URL: http://sparkyfitness-mcp:3001
      PUID: 1000
      GUID: 1000
    depends_on:
      sparkyfitness-db:
        condition: service_healthy
    volumes:
      - ${APP_DATA_DIR}/backup:/app/SparkyFitnessServer/backup
      - ${APP_DATA_DIR}/uploads:/app/SparkyFitnessServer/uploads
    networks:
      - sparkyfitness-network

  sparkyfitness-frontend:
    image: codewithcj/sparkyfitness:latest # Use pre-built image
    container_name: sparkyfitness-frontend
    restart: always
    environment:
      SPARKY_FITNESS_FRONTEND_URL: ${SPARKY_FITNESS_FRONTEND_URL:-http://localhost:3004}
      SPARKY_FITNESS_SERVER_HOST: sparkyfitness-server
      SPARKY_FITNESS_SERVER_PORT: 3010
      PUID: 1000
      GUID: 1000
    networks:
      - sparkyfitness-network
    depends_on:
      - sparkyfitness-server
      - tipi_main_network
    x-runtipi:
      is_main: true
      internal_port: 80
    labels:
      traefik.enable: true
      traefik.http.middlewares.sparkyfitness-web-redirect.redirectscheme.scheme: https
      traefik.http.services.sparkyfitness.loadbalancer.server.port: 80
      traefik.http.routers.sparkyfitness-insecure.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.sparkyfitness-insecure.entrypoints: web
      traefik.http.routers.sparkyfitness-insecure.service: sparkyfitness
      traefik.http.routers.sparkyfitness-insecure.middlewares: sparkyfitness-web-redirect
      traefik.http.routers.sparkyfitness.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.sparkyfitness.entrypoints: websecure
      traefik.http.routers.sparkyfitness.service: sparkyfitness
      traefik.http.routers.sparkyfitness.tls.certresolver: myresolver
      traefik.http.routers.sparkyfitness-local-insecure.rule: Host(`sparkyfitness.${LOCAL_DOMAIN}`)
      traefik.http.routers.sparkyfitness-local-insecure.entrypoints: web
      traefik.http.routers.sparkyfitness-local-insecure.service: sparkyfitness
      traefik.http.routers.sparkyfitness-local-insecure.middlewares: sparkyfitness-web-redirect
      traefik.http.routers.sparkyfitness-local.rule: Host(`sparkyfitness.${LOCAL_DOMAIN}`)
      traefik.http.routers.sparkyfitness-local.entrypoints: websecure
      traefik.http.routers.sparkyfitness-local.service: sparkyfitness
      traefik.http.routers.sparkyfitness-local.tls: true
      runtipi.managed: true

  sparkyfitness-mcp:
    image: codewithcj/sparkyfitness_mcp:latest
    container_name: sparkyfitness-mcp
    restart: always
    environment:
      SPARKY_FITNESS_DB_USER: ${SPARKY_FITNESS_DB_USER:-sparky}
      SPARKY_FITNESS_DB_HOST: sparkyfitness-db
      SPARKY_FITNESS_DB_NAME: ${SPARKY_FITNESS_DB_NAME:-sparkyfitness_db}
      SPARKY_FITNESS_DB_PASSWORD: ${SPARKY_FITNESS_DB_PASSWORD}
      SPARKY_FITNESS_APP_DB_USER: ${SPARKY_FITNESS_APP_DB_USER:-sparkyapp}
      SPARKY_FITNESS_APP_DB_PASSWORD: ${SPARKY_FITNESS_APP_DB_PASSWORD}
      SPARKY_FITNESS_DB_PORT: 5432
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      MCP_TRANSPORT: "http"
      SPARKY_FITNESS_SERVER_HOST: sparkyfitness-server
      SPARKY_FITNESS_SERVER_PORT: 3010
      SPARKY_FITNESS_FRONTEND_URL: ${SPARKY_FITNESS_FRONTEND_URL:-http://localhost:3004}
      SPARKY_FITNESS_API_KEY: ${SPARKY_FITNESS_API_KEY:-}
    depends_on:
      - sparkyfitness-db
    networks:
      - sparkyfitness-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  sparkyfitness-network:
    name: sparkyfitness-network
    external: true

x-runtipi:
  schema_version: 2
