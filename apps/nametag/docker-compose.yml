services:
  db:
    image: postgres:16-alpine
    container_name: nametag-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-nametag}
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-nametag}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nametag-network

  redis:
    image: redis:7-alpine
    container_name: nametag-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ${APP_DATA_DIR}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nametag-network

  app:
    image: ghcr.io/mattogodoy/nametag:latest
    container_name: nametag-app
    restart: unless-stopped
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-nametag}
      DB_HOST: db
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CRON_SECRET: ${CRON_SECRET}
    volumes:
      - ${APP_DATA_DIR}/photos:/app/data/photos
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nametag-network
      - tipi_main_network
    x-runtipi:
      is_main: true
      internal_port: 3000
    labels:
      traefik.enable: true
      traefik.http.middlewares.nametag-web-redirect.redirectscheme.scheme: https
      traefik.http.services.nametag.loadbalancer.server.port: 3000
      traefik.http.routers.nametag-insecure.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.nametag-insecure.entrypoints: web
      traefik.http.routers.nametag-insecure.service: nametag
      traefik.http.routers.nametag-insecure.middlewares: nametag-web-redirect
      traefik.http.routers.nametag.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.nametag.entrypoints: websecure
      traefik.http.routers.nametag.service: nametag
      traefik.http.routers.nametag.tls.certresolver: myresolver
      traefik.http.routers.nametag-local-insecure.rule: Host(`nametag.${LOCAL_DOMAIN}`)
      traefik.http.routers.nametag-local-insecure.entrypoints: web
      traefik.http.routers.nametag-local-insecure.service: nametag
      traefik.http.routers.nametag-local-insecure.middlewares: nametag-web-redirect
      traefik.http.routers.nametag-local.rule: Host(`nametag.${LOCAL_DOMAIN}`)
      traefik.http.routers.nametag-local.entrypoints: websecure
      traefik.http.routers.nametag-local.service: nametag
      traefik.http.routers.nametag-local.tls: true
      runtipi.managed: true

  backup:
    image: prodrigestivill/postgres-backup-local
    container_name: nametag-backup
    restart: always
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${DB_NAME:-nametag}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
    volumes:
      - ${APP_DATA_DIR}/backups:/backups
    depends_on:
      - db
    networks:
      - nametag-network

  cron:
    image: alpine:3.19
    container_name: nametag-cron
    restart: always
    environment:
      - CRON_SECRET=${CRON_SECRET}
    depends_on:
      - app
    command: >
      sh -c "
        echo '0 8 * * * wget -q -O - --header=\"Authorization: Bearer '$$CRON_SECRET'\" http://app:3000/api/cron/send-reminders > /proc/1/fd/1 2>&1' > /etc/crontabs/root &&
        echo '0 3 * * * wget -q -O - --header=\"Authorization: Bearer '$$CRON_SECRET'\" http://app:3000/api/cron/purge-deleted > /proc/1/fd/1 2>&1' >> /etc/crontabs/root &&
        echo '0 2,10,18 * * * wget -q -O - --header=\"Authorization: Bearer '$$CRON_SECRET'\" http://app:3000/api/cron/carddav-sync > /proc/1/fd/1 2>&1' >> /etc/crontabs/root &&
        crond -f -l 2
      "
    networks:
      - nametag-network

networks:
  nametag-network:
    name: nametag-network
    external: true

x-runtipi:
  schema_version: 2
